version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: master_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./generate_data.sql:/generate_data.sql

  mongodb:
    image: mongo:6
    container_name: replica_db
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  python-app:
    image: python:3.9-slim
    container_name: etl_script
    volumes:
      - ./scripts:/scripts
      - ./sync_state.txt:/sync_state.txt
    env_file:
      - scripts/.env
    depends_on:
      - postgres
      - mongodb
    command: >
      sh -c "
          apt-get update && apt-get install -y cron &&
          pip install -r /scripts/requirements.txt &&
          echo '*/5 * * * * cd /scripts && /usr/local/bin/python /scripts/replicate.py >> /var/log/cron.log 2>&1' | crontab - &&
          touch /var/log/cron.log &&
          cron &&
          tail -f /var/log/cron.log
        "

volumes:
  pg_data:
  mongo_data: